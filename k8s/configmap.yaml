apiVersion: v1
kind: ConfigMap
metadata:
  name: stock-mldl-config
  namespace: stock-mldl
  labels:
    app.kubernetes.io/part-of: stock-mldl
data:
  MONGODB_URI: "mongodb://mongodb:27017"
  MONGODB_DB_NAME: "stock_mldl"
  # 프로덕션에서는 실제 도메인으로 변경하세요.
  # 예: "https://myapp.example.com"
  CORS_ORIGINS: "*"
